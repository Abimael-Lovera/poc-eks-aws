# ArgoCD Project for Kong and Infrastructure
# Defines RBAC boundaries and allowed sources

apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: kong-project
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: Kong API Gateway and related infrastructure

  # Source repositories
  sourceRepos:
    - 'https://github.com/your-org/poc-eks-aws'  # Replace with your repo
    - 'https://charts.konghq.com'
    - 'https://flagger.app'
    - 'https://prometheus-community.github.io/helm-charts'

  # Destination clusters and namespaces
  destinations:
    # Kong namespaces
    - namespace: kong
      server: https://kubernetes.default.svc
    - namespace: kong-dev
      server: https://kubernetes.default.svc
    - namespace: kong-staging
      server: https://kubernetes.default.svc
    - namespace: kong-prod
      server: https://kubernetes.default.svc
    
    # Flagger namespace
    - namespace: flagger-system
      server: https://kubernetes.default.svc
    
    # Monitoring namespace
    - namespace: monitoring
      server: https://kubernetes.default.svc

  # Allowed cluster resources
  clusterResourceWhitelist:
    - group: ''
      kind: Namespace
    - group: 'apiextensions.k8s.io'
      kind: CustomResourceDefinition
    - group: 'rbac.authorization.k8s.io'
      kind: ClusterRole
    - group: 'rbac.authorization.k8s.io'
      kind: ClusterRoleBinding
    - group: 'networking.k8s.io'
      kind: IngressClass

  # Allowed namespace resources
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'

  # Sync windows for controlled deployments
  syncWindows:
    # Allow all syncs in dev (always)
    - kind: allow
      schedule: '* * * * *'
      duration: 24h
      namespaces:
        - kong-dev
      manualSync: true

    # Staging: business hours only
    - kind: allow
      schedule: '0 9 * * 1-5'  # Mon-Fri 9am
      duration: 10h
      namespaces:
        - kong-staging
      manualSync: true

    # Production: business hours, manual only
    - kind: allow
      schedule: '0 10 * * 1-4'  # Mon-Thu 10am
      duration: 8h
      namespaces:
        - kong-prod
      manualSync: true

  # Orphaned resources monitoring
  orphanedResources:
    warn: true

  # Role definitions
  roles:
    - name: developer
      description: Developer access to dev/staging
      policies:
        - p, proj:kong-project:developer, applications, get, kong-project/*, allow
        - p, proj:kong-project:developer, applications, sync, kong-project/*-dev, allow
        - p, proj:kong-project:developer, applications, sync, kong-project/*-staging, allow
      groups:
        - developers

    - name: sre
      description: SRE full access
      policies:
        - p, proj:kong-project:sre, applications, *, kong-project/*, allow
      groups:
        - sre-team

# Flagger Installation - ArgoCD Application
# Deploys Flagger controller with Kong provider

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: flagger
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: kong-project

  source:
    repoURL: https://flagger.app
    chart: flagger
    targetRevision: 1.37.0
    helm:
      releaseName: flagger
      values: |
        # Mesh provider - Kong native support
        meshProvider: kong
        
        # Metrics server for canary analysis
        metricsServer: http://prometheus-server.monitoring:80
        
        # Enable Slack notifications (optional)
        slack:
          url: ""  # Set via --set or secret
          channel: deployments
          user: flagger
        
        # High availability
        replicaCount: 2
        
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 1000m
            memory: 512Mi
        
        # Pod disruption budget
        podDisruptionBudget:
          enabled: true
          minAvailable: 1
        
        # Prometheus ServiceMonitor
        prometheus:
          install: false  # Use existing Prometheus
        
        # Leader election for HA
        leaderElection:
          enabled: true

  destination:
    server: https://kubernetes.default.svc
    namespace: flagger-system

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        maxDuration: 3m
        factor: 2

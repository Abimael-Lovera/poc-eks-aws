# Kind cluster configuration for local development
# Mirrors EKS multi-node setup with port mappings for Kong
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: poc-eks-local
nodes:
  # Control plane node
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      # Kong Proxy HTTP
      - containerPort: 30080
        hostPort: 8000
        protocol: TCP
      # Kong Proxy HTTPS
      - containerPort: 30443
        hostPort: 8443
        protocol: TCP
      # Kong Admin API (local only)
      - containerPort: 30001
        hostPort: 8001
        protocol: TCP
  
  # Worker nodes
  - role: worker
    kubeadmConfigPatches:
      - |
        kind: JoinConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "node-type=worker"
  
  - role: worker
    kubeadmConfigPatches:
      - |
        kind: JoinConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "node-type=worker"

# Networking configuration
networking:
  # Use default CNI (kindnet)
  disableDefaultCNI: false
  # Pod subnet
  podSubnet: "10.244.0.0/16"
  # Service subnet  
  serviceSubnet: "10.96.0.0/16"
